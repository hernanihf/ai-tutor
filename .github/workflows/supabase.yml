name: Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Apply pending migrations
        run: |
          for file in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$file" .sql | cut -d_ -f1)
            echo "Checking migration $version..."

            already_applied=$(supabase migration list 2>/dev/null | grep "$version" | grep -c "applied" || true)

            if [ "$already_applied" -gt 0 ]; then
              echo "  → already applied, skipping"
            else
              echo "  → applying $file"
              supabase db execute --file "$file"
              supabase migration repair --status applied "$version"
              echo "  ✓ done"
            fi
          done
